services:
  gateway:
    build: .
    ports:
      - "8080:8080"
    environment:
      REDIS_URL: redis://redis:6379/0
      CONFIG_PATH: config/config.yaml
      ADMIN_API_KEY: ${ADMIN_API_KEY:-changeme-admin-key}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - ./config:/app/config:ro     # edit config.yaml on the host → hot reload
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # Not published to the host — the gateway reaches it via the internal
    # Docker network (redis://redis:6379). Uncomment to debug from the host.
    # ports:
    #   - "6379:6379"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      - gateway
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"   # host 3001 → container 3000 (3000 was busy on this host)
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
