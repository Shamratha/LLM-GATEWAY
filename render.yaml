# Render Blueprint — deploys the gateway + a managed Redis on the free tier.
#
# Deploy: push this repo to GitHub, then in the Render dashboard:
#   New + → Blueprint → pick this repo. Render reads render.yaml and creates
#   both services. Set OPENAI_API_KEY / ANTHROPIC_API_KEY when prompted (or
#   leave blank to run on the zero-cost mock provider).
#
# Note: Prometheus + Grafana are intentionally NOT deployed here — they need a
# persistent disk (a paid add-on on Render) and must stay always-on, which the
# free tier spins down. Run the full observability stack locally via
# `docker compose up`, or on a small VM. The gateway still exposes /metrics.

services:
  - type: web
    name: llm-gateway
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      # Wire the gateway to the managed Redis below.
      - key: REDIS_URL
        fromService:
          type: redis
          name: llm-gateway-redis
          property: connectionString
      # Strong admin token, generated by Render (view it in the dashboard).
      - key: ADMIN_API_KEY
        generateValue: true
      # Real provider keys — set in the dashboard. Blank ⇒ mock provider only.
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # Tracing stays off in this lightweight deploy.
      - key: OTEL_ENABLED
        value: "0"

  - type: redis
    name: llm-gateway-redis
    plan: free
    ipAllowList: []              # internal-only: reachable from the gateway, not the public internet
    maxmemoryPolicy: noeviction  # don't silently drop rate-limit buckets / budget counters
